id: docker-course-intro
title: "Docker: nima va nima uchun"
description: "Terminalda `docker run hello-world` buyrug'ini ishlatib, Docker'ning birinchi konteynerni muvaffaqiyatli ishga tushirishini ko'ring."
difficulty: beginner
estimated_minutes: 10

setup:
  - "docker pull hello-world 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker ps -a --format '{{.Image}}' | grep -x 'hello-world'"
      exit_code: 0
      error_message: "hello-world konteyner ishlatilmagan. 'docker run hello-world' buyrug'ini bajaring"
