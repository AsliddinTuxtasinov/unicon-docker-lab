id: docker-real-project-setup
title: "Real project setup (DB + backend + redis)"
description: "`/tmp/myproject/docker-compose.yml` faylida postgres va redis servicelarini o'z ichiga olgan to'liq loyiha compose faylini yarating. Bu real backend loyihalarda ishlatiladigan standart arxitektura."
difficulty: intermediate
estimated_minutes: 30

setup:
  - "docker pull postgres:15-alpine 2>/dev/null || true"
  - "docker pull redis:7-alpine 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "test -f /tmp/myproject/docker-compose.yml"
      exit_code: 0
      error_message: "/tmp/myproject/docker-compose.yml topilmadi. mkdir -p /tmp/myproject va docker-compose.yml yarating"
    - type: exec
      command: "grep 'postgres' /tmp/myproject/docker-compose.yml"
      exit_code: 0
      error_message: "docker-compose.yml da postgres service yo'q"
    - type: exec
      command: "grep 'redis' /tmp/myproject/docker-compose.yml"
      exit_code: 0
      error_message: "docker-compose.yml da redis service yo'q"
