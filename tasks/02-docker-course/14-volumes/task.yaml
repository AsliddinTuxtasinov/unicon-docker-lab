id: docker-volumes
title: "Docker volumes va persistence"
description: "`docker volume create mydata` buyrug'i bilan nomlangan volume yarating. Volume — konteyner o'chirilganda ham ma'lumotlar saqlanib qoladigan maxsus saqlash joyi."
difficulty: intermediate
estimated_minutes: 20

setup: []

verify:
  steps:
    - type: exec
      command: "docker volume ls --format '{{.Name}}' | grep -x 'mydata'"
      exit_code: 0
      error_message: "mydata volume topilmadi. 'docker volume create mydata' bajaring"
