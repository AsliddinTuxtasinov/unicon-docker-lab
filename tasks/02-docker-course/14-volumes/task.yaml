id: docker-volumes
title: "Docker volumes va persistence"
difficulty: intermediate
estimated_minutes: 20

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker volume ls"
      exit_code: 0
      error_message: "docker volume ls ishlamadi"
    - type: exec
      command: "docker run --rm -v /tmp:/data alpine:3.18 sh -c 'echo vol-test > /data/vol-verify.txt && cat /data/vol-verify.txt' | grep vol-test"
      exit_code: 0
      error_message: "Volume mount ishlamadi"
