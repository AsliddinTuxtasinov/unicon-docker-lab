id: docker-compose-structure
title: "`docker-compose.yml` strukturasi"
description: "`/tmp/myapp/docker-compose.yml` faylida kamida bitta `image:` ko'rsatilgan service bo'lgan to'liq compose fayl yarating. Fayl `services:`, `image:` va `ports:` bo'limlarini o'z ichiga olsin."
difficulty: intermediate
estimated_minutes: 20

setup: []

verify:
  steps:
    - type: exec
      command: "test -f /tmp/myapp/docker-compose.yml && grep -i 'services' /tmp/myapp/docker-compose.yml"
      exit_code: 0
      error_message: "/tmp/myapp/docker-compose.yml topilmadi yoki 'services' yo'q. mkdir -p /tmp/myapp va docker-compose.yml yarating"
    - type: exec
      command: "grep -q 'image:' /tmp/myapp/docker-compose.yml"
      exit_code: 0
      error_message: "docker-compose.yml da kamida bitta 'image:' bo'lishi kerak"
