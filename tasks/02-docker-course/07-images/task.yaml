id: docker-images
title: "Docker image tushunchasi"
description: "`docker pull alpine:3.18` buyrug'ini ishlatib Docker Hub'dan image yuklab oling va `docker images` bilan mavjud imagelarni ko'ring."
difficulty: beginner
estimated_minutes: 10

setup: []

verify:
  steps:
    - type: exec
      command: "docker images --format '{{.Repository}}:{{.Tag}}' | grep -x 'alpine:3.18'"
      exit_code: 0
      error_message: "alpine:3.18 image topilmadi. 'docker pull alpine:3.18' bajaring"
