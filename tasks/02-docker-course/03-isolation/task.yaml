id: docker-isolation
title: "Isolation konsepti"
difficulty: intermediate
estimated_minutes: 15

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker run --rm alpine:3.18 sh -c 'cat /proc/1/comm'"
      exit_code: 0
      error_message: "Konteyner process namespace tekshiruvi muvaffaqiyatsiz"
