id: docker-networks
title: "Docker networks va bridge"
description: "`docker network create mynet` buyrug'i bilan maxsus bridge network yarating. Docker network — konteynerlarga bir-biri bilan muloqot qilish imkonini beradi."
difficulty: intermediate
