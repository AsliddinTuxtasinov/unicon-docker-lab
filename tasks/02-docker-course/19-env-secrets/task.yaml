id: docker-env-secrets
title: "Environment variables va secrets"
difficulty: intermediate
estimated_minutes: 20

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker run --rm -e SECRET_KEY=test-value alpine:3.18 sh -c 'echo $SECRET_KEY' | grep test-value"
      exit_code: 0
      error_message: "Environment variable konteynerga uzatilmadi"
