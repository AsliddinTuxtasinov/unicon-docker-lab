id: docker-lifecycle
title: "Container lifecycle boshqarish"
description: "`docker run -d --name lifecycle-test alpine:3.18 sleep 60` bilan konteyner yarating, so'ng `docker stop lifecycle-test` bilan to'xtating. Konteyner holatlari: created → running → exited."
difficulty: beginner
estimated_minutes: 15

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker ps -a --filter name=lifecycle-test --format '{{.Status}}' | grep -i exited"
      exit_code: 0
      error_message: "lifecycle-test konteyner topilmadi yoki to'xtatilmagan. 'docker run -d --name lifecycle-test alpine:3.18 sleep 60' keyin 'docker stop lifecycle-test' bajaring"
