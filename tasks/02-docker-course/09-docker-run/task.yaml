id: docker-run
title: "`docker run` komandasi"
description: "`docker run --name run-test -e MYVAR=hello alpine:3.18 sh -c 'echo $MYVAR'` buyrug'ini ishlatib environment variable qanday konteynerga uzatilishini ko'ring."
difficulty: beginner
estimated_minutes: 15

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker ps -a --filter name=run-test --format '{{.Names}}' | grep run-test"
      exit_code: 0
      error_message: "run-test konteyner topilmadi. 'docker run --name run-test -e MYVAR=hello alpine:3.18 sh -c \"echo \\$MYVAR\"' bajaring"
