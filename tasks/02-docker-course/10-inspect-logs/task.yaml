id: docker-inspect-logs
title: "Container inspect va logs"
description: "`docker run --name log-test alpine:3.18 sh -c 'echo hello-from-log'` ishlatib konteyner yarating, so'ng `docker logs log-test` va `docker inspect log-test` bilan ma'lumotlarni o'rganing."
difficulty: beginner
estimated_minutes: 15

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker ps -a --filter name=log-test --format '{{.Names}}' | grep log-test"
      exit_code: 0
      error_message: "log-test konteyner topilmadi. 'docker run --name log-test alpine:3.18 sh -c \"echo hello-from-log\"' bajaring"
    - type: exec
      command: "docker logs log-test 2>&1 | grep hello-from-log"
      exit_code: 0
      error_message: "log-test logida 'hello-from-log' topilmadi"
