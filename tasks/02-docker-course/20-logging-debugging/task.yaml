id: docker-logging-debugging
title: "Logs va debugging, best practices"
difficulty: intermediate
estimated_minutes: 20

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker run --rm alpine:3.18 echo debug-test | grep debug-test"
      exit_code: 0
      error_message: "Konteyner log chiqarmadi"
    - type: exec
      command: "docker logs --help | grep 'Usage'"
      exit_code: 0
      error_message: "docker logs ishlamadi"
