id: docker-logging-debugging
title: "Logs va debugging, best practices"
description: "`docker run --name debug-test alpine:3.18 sh -c 'echo debug-message'` bilan konteyner yarating, so'ng `docker logs debug-test` bilan loglarni o'qing va `docker inspect debug-test` bilan konteyner holatini tekshiring."
difficulty: intermediate
estimated_minutes: 20

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker ps -a --filter name=debug-test --format '{{.Names}}' | grep debug-test"
      exit_code: 0
      error_message: "debug-test konteyner topilmadi. 'docker run --name debug-test alpine:3.18 sh -c \"echo debug-message\"' bajaring"
    - type: exec
      command: "docker logs debug-test 2>&1 | grep debug-message"
      exit_code: 0
      error_message: "debug-test logida 'debug-message' topilmadi"
