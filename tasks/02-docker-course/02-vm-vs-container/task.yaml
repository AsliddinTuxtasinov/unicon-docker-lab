id: docker-vm-vs-container
title: "VM vs Container farqi"
description: "`docker run --name vm-compare alpine:3.18 echo done` buyrug'ini ishlatib, konteyner qanday qilib virtual mashinadan farq qilishini ko'ring — konteyner soniyalar ichida ishga tushadi."
difficulty: beginner
estimated_minutes: 10

setup:
  - "docker pull alpine:3.18 2>/dev/null || true"

verify:
  steps:
    - type: exec
      command: "docker ps -a --filter name=vm-compare --format '{{.Names}}' | grep vm-compare"
      exit_code: 0
      error_message: "vm-compare konteyner topilmadi. 'docker run --name vm-compare alpine:3.18 echo done' bajaring"
